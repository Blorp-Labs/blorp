name: PR Title

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  check-title:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      TITLE: ${{ github.event.pull_request.title }}
    steps:
      - name: Enforce capital first letter
        run: |
          if [[ ! "$TITLE" =~ ^[A-Z] ]]; then
            echo "PR title must start with a capital letter."
            exit 1
          fi

      - name: Spell check PR title
        run: |
          # Find existing bot comment
          COMMENT_ID=$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --jq '[.[] | select(.body | startswith("<!-- pr-title-spellcheck -->"))] | first | .id // empty')

          # Spell check the title
          echo "$TITLE" > /tmp/title.txt
          MISSPELLED=$(npx --yes cspell /tmp/title.txt --no-summary 2>&1 \
            | grep -oP 'Unknown word \(\K[^)]+' || true)

          if [ -n "$MISSPELLED" ]; then
            WORD_LIST=$(echo "$MISSPELLED" | sed 's/^/- `/;s/$/`/')
            BODY=$(printf '<!-- pr-title-spellcheck -->\n**Possible spelling issue(s) in PR title:**\n\n%s\n\n_If intentional (technical terms, proper nouns), ignore this. Add to `.cspell.json` to silence it._' \
              "$WORD_LIST")

            if [ -n "$COMMENT_ID" ]; then
              gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" \
                -X PATCH -f body="$BODY"
            else
              gh api "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
                -f body="$BODY"
            fi
          elif [ -n "$COMMENT_ID" ]; then
            # No issues — delete the previous warning comment
            gh api "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID" -X DELETE
          fi
