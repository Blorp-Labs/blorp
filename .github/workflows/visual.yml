name: Visual Tests

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      update_snapshots:
        description: "Regenerate snapshots and commit them"
        type: boolean
        default: false

concurrency:
  group: "visual-${{ github.event.pull_request.head.sha || github.sha }}"
  cancel-in-progress: true

jobs:
  visual:
    name: Visual Snapshot Tests
    if: github.event.pull_request.draft == false || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium

      - name: Update snapshots
        if: inputs.update_snapshots
        run: pnpm test:visual:update

      - name: Commit updated snapshots
        if: inputs.update_snapshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add visual-snapshots/
          git diff --cached --quiet || git commit -m "chore: update visual snapshots"
          git push

      - name: Run visual tests
        if: "!inputs.update_snapshots"
        run: pnpm test:visual

      - name: Upload snapshot diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-snapshot-diffs
          path: |
            visual-snapshots/
            test-results/
          retention-days: 7
