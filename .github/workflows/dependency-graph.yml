name: PR Quality

on:
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: "dep-graph-${{ github.event.pull_request.number }}"
  cancel-in-progress: true

jobs:
  dependency-graph:
    name: Dependency Graph
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Graphviz
        run: sudo apt-get install -y graphviz

      - name: Generate DOT graph
        run: pnpm exec depcruise src --output-type dot > dep-graph.dot

      - name: Render PNG from DOT
        run: dot -T png -Gdpi=150 dep-graph.dot > dep-graph.png

      - name: Upload artifacts for debugging
        uses: actions/upload-artifact@v4
        with:
          name: dep-graph-${{ github.event.pull_request.number }}
          path: |
            dep-graph.dot
            dep-graph.png

      - name: Push PNG to artifacts branch
        run: |
          PNG_NAME="dep-graph-${{ github.event.pull_request.number }}.png"
          cp dep-graph.png /tmp/$PNG_NAME

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git fetch origin artifacts; then
            git checkout -B artifacts origin/artifacts
          else
            git checkout --orphan artifacts
            git rm -rf . 2>/dev/null || true
            git clean -fdx 2>/dev/null || true
          fi

          cp /tmp/$PNG_NAME ./$PNG_NAME
          git add "$PNG_NAME"
          if git diff --staged --quiet; then
            echo "Dependency graph unchanged"
          else
            git commit -m "dep-graph: update for PR #${{ github.event.pull_request.number }}"
            git push origin artifacts
          fi

  post-comment:
    name: Post Comment
    runs-on: ubuntu-latest
    needs: dependency-graph
    permissions:
      pull-requests: write
    steps:
      - name: Post comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: dep-graph
          message: |
            ## Dependency Graph

            <img src="https://raw.githubusercontent.com/Blorp-Labs/blorp/artifacts/dep-graph-${{ github.event.pull_request.number }}.png?v=${{ github.run_id }}" alt="Dependency graph — one node per top-level folder in src/" />

            *One node per top-level folder in `src/`. Generated by [dependency-cruiser](https://github.com/sverweij/dependency-cruiser).*
